<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AI Agent 中控台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1e;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{text-align:center;max-width:380px;width:100%}
h1{font-size:24px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:12px;color:#484f58;margin-bottom:24px}
.spinner{width:40px;height:40px;border:3px solid #21262d;border-top-color:#58a6ff;border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status{font-size:14px;color:#8b949e;margin-bottom:8px}
.progress{width:100%;height:3px;background:#21262d;border-radius:2px;margin:12px 0;overflow:hidden}
.progress-bar{width:0%;height:100%;background:linear-gradient(90deg,#58a6ff,#bc8cff);transition:width .3s}
.log{text-align:left;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:10px 12px;margin-top:16px;font-size:11px;font-family:monospace;color:#484f58;max-height:180px;overflow:auto;display:none;white-space:pre-wrap;word-break:break-all}
.log.show{display:block}
.log .log-ok{color:#3fb950}
.log .log-err{color:#f85149}
.error{color:#f85149;font-size:13px;margin-top:12px;display:none;line-height:1.5}
.error.show{display:block}
.btn{display:none;margin-top:16px;background:#1f6feb;color:#fff;padding:10px 28px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.btn.show{display:inline-block}
.btn:active{transform:scale(.96)}
</style>
</head>
<body>
<div class="box">
<h1>AI Agent 中控台</h1>
<div class="sub">v7.1.0 &middot; Termux Runtime</div>
<div class="spinner" id="spinner"></div>
<div class="status" id="status">正在初始化 Linux 环境...</div>
<div class="progress"><div class="progress-bar" id="progress"></div></div>
<div class="log" id="log"></div>
<div class="error" id="error"></div>
<button class="btn" id="retryBtn" onclick="retry()">重试</button>
</div>

<script>
var MAX_WAIT = 90;
var startTime = Date.now();
var pollTimer = null;
var attempts = 0;

function addLog(msg, type) {
  var el = document.getElementById('log');
  el.classList.add('show');
  var cls = type ? ' log-' + type : '';
  el.innerHTML += '<span class="' + cls + '">' + msg + '</span>\n';
  el.scrollTop = el.scrollHeight;
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function setProgress(pct) {
  document.getElementById('progress').style.width = pct + '%';
}

function showError(msg) {
  var el = document.getElementById('error');
  el.innerHTML = msg;
  el.classList.add('show');
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('retryBtn').classList.add('show');
  setProgress(100);
}

function retry() {
  document.getElementById('error').classList.remove('show');
  document.getElementById('retryBtn').classList.remove('show');
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('log').classList.remove('show');
  document.getElementById('log').innerHTML = '';
  startTime = Date.now();
  attempts = 0;
  setStatus('正在重试...');
  setProgress(0);
  startPolling();
}

function poll() {
  attempts++;
  var elapsed = Math.floor((Date.now() - startTime) / 1000);
  setStatus('等待服务就绪... (' + elapsed + 's)');
  setProgress(Math.min(elapsed / MAX_WAIT * 100, 95));

  var xhr = new XMLHttpRequest();
  xhr.timeout = 3000;
  xhr.open('GET', 'http://127.0.0.1:3001/api/health');
  xhr.onload = function() {
    if (xhr.status === 200) {
      addLog('[' + elapsed + 's] 服务就绪，跳转中...', 'ok');
      setStatus('服务已启动！');
      setProgress(100);
      document.getElementById('spinner').style.display = 'none';
      clearInterval(pollTimer);
      setTimeout(function() {
        window.location.href = 'http://127.0.0.1:3001/';
      }, 500);
    } else {
      addLog('[' + elapsed + 's] HTTP ' + xhr.status);
    }
  };
  xhr.onerror = function() {
    addLog('[' + elapsed + 's] 连接中...');
  };
  xhr.ontimeout = function() {
    addLog('[' + elapsed + 's] 超时');
  };

  try { xhr.send(); } catch(e) {
    addLog('[' + elapsed + 's] 发送失败: ' + e.message);
  }

  if (elapsed >= MAX_WAIT) {
    clearInterval(pollTimer);
    showError(
      '服务启动超时（' + MAX_WAIT + '秒）<br><br>' +
      '可能原因：<br>' +
      '&bull; rootfs 解压尚未完成（首次启动需数分钟）<br>' +
      '&bull; 存储空间不足<br>' +
      '&bull; 设备不支持 proot<br><br>' +
      '请关闭应用后重新打开重试'
    );
    addLog('[失败] 超时，已等待 ' + elapsed + ' 秒', 'err');
  }
}

function startPolling() {
  addLog('架构: proot + Debian rootfs + Node.js', 'ok');
  addLog('轮询 http://127.0.0.1:3001/api/health...');
  setProgress(5);
  pollTimer = setInterval(poll, 1500);
  poll();
}

startPolling();
</script>
</body>
</html>
